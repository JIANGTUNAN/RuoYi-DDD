# 服务器配置
server:
  port: 8080

# Spring 配置
spring:
  profiles:
    # 激活本地环境配置（敏感信息独立管理，不提交到远程仓库）
    active: local
  application:
    name: ruoyi-ddd
  # 数据源配置
  datasource:
    # MySQL 驱动类名
    driver-class-name: com.mysql.cj.jdbc.Driver
    # HikariCP 连接池配置
    hikari:
      # 最小空闲连接数
      minimum-idle: 5
      # 最大连接数
      maximum-pool-size: 20
      # 空闲连接超时时间（单位：毫秒，默认 10 分钟）
      idle-timeout: 600000
      # 连接最大存活时间（单位：毫秒，默认 30 分钟）
      max-lifetime: 1800000
      # 获取连接超时时间（单位：毫秒，默认 30 秒）
      connection-timeout: 30000
  # Redis 配置
  data:
    redis:
      # Redis 服务器端口
      port: 6379
      # Redis 数据库索引（默认 0）
      database: 0
      # Lettuce 连接池配置
      lettuce:
        pool:
          # 最大活跃连接数
          max-active: 20
          # 最大空闲连接数
          max-idle: 10
          # 最小空闲连接数
          min-idle: 5
          # 获取连接最大等待时间（-1 表示无限等待）
          max-wait: -1ms

# RuoYi 安全配置
ruoyi:
  security:
    # Mock 身份功能（仅开发环境开启，生产环境必须关闭）
    # 开启后 token 传入 test-{userId} 格式可自动以该用户身份登录
    mock-enabled: false
    # 公开路径白名单（不需要登录校验）
    public-paths:
      - /error
      - /favicon.ico
    # RSA 密钥配置（纯 Base64，无 PEM 头尾）
    rsa:
      private-key: ''
      public-key: ''
    # 允许跨域的前端地址
    cors-origins:
      - http://localhost:8080

# Sa-Token 配置
sa-token:
  # token 名称（同时也是 cookie 名称）
  token-name: Authorization
  # token 有效期（单位：秒），默认 30 天
  timeout: 2592000
  # token 临时有效期（指定时间内无操作则过期），默认 30 分钟
  active-timeout: 1800
  # 是否允许同一账号多地同时登录
  is-concurrent: true
  # 多人登录同一账号时，是否共用一个 token
  is-share: false
  # token 风格（uuid、simple-uuid、random-32、random-64、random-128、tik）
  token-style: uuid
  # 是否输出操作日志
  is-log: false
